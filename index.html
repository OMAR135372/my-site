<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>خارطة فلسطين التفاعلية | دليل المحلات والأماكن التجارية</title>
    <meta name="description" content="اكتشف خارطة العالم وفلسطين التفاعلية مجاناً. دليل كامل للبحث عن المحلات التجارية، المطاعم، والأماكن السياحية بديل جوجل ماب.">
    <meta name="keywords" content="خارطة, خريطة, جوجل ماب, دليل تجاري, خرائط فلسطين, نابلس, الخليل, رام الله, أماكن سياحية">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            background-color: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            border: 1px solid #334155;
        }
        h1 { color: #38bdf8; font-size: 2.2rem; margin-top: 0; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 20px; }
        #map { height: 450px; width: 100%; border-radius: 12px; border: 2px solid #38bdf8; }
    </style>
</head>
<body>

    <div class="container">
        <h1>خارطة فلسطين التفاعلية والدليل التجاري</h1>
        <p>موقع خرائط مجاني مخصص للبحث عن المحلات، الفنادق، والمقاهي المحلية بكل سهولة.</p>
        <div id="map"></div>
    </div>

    <div style="display: none;">
        <script type="text/javascript" src="https://counter10.optistats.ovh/private/counter.js?c=y1p27r3b9z7g7beunwaz7g81n1be3kfx&down=async" async></script>
    </div>

    <script>
        // 1. تشغيل الخريطة وتحديد مستوى زووم أدنى (minZoom: 2) لمنع التصغير المبالغ فيه
var map = L.map('map', {
    minZoom: 2,
    maxZoom: 19
}).setView([31.947, 35.227], 8);

// 2. استدعاء الخريطة مع تفعيل أمر (noWrap: true) لمنع تكرار العالم بجانب بعضه
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    noWrap: true, // يمنع تكرار الخريطة أفقياً
    attribution: '© OpenStreetMap'
}).addTo(map);

// 3. إضافة علامة الدبوس
var marker = L.marker([32.221, 35.254]).addTo(map);
marker.bindPopup("<b>مرحباً بك في نابلس!</b><br>دليل المحلات التجارية هنا.").openPopup();
    </script>

</body>
</html>
